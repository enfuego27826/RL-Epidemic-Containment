# Full Pipeline configuration — combines all phases
# ST-GNN encoder + belief state + system ID + MoRL + robustness evaluation
# Used by:
#   python scripts/train.py --config configs/full_pipeline.yaml
#   python scripts/run_eval_harness.py --config configs/full_pipeline.yaml
#   python scripts/inference.py --config configs/full_pipeline.yaml

# ── Environment ────────────────────────────────────────────────────────────────
env:
  task_name: "medium_multi_center_spread"
  seed: 42
  max_nodes: 20

# ── PPO Hyperparameters ────────────────────────────────────────────────────────
ppo:
  total_timesteps: 500000
  n_envs: 1
  n_steps: 64
  batch_size: 256
  n_epochs: 4
  lr: 3.0e-4
  lr_schedule: "none"
  lr_final: 3.0e-5
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5

# ── Network Architecture (Phase 3 ST-GNN) ─────────────────────────────────────
model:
  policy_type: "st"                  # baseline | hybrid | st
  hidden_dims: [128, 128]
  gcn_hidden_dim: 32
  gru_hidden_dim: 32
  global_context_dim: 32
  actor_hidden_dim: 64

# ── Phase 2: Hybrid Action ────────────────────────────────────────────────────
hybrid:
  enabled: true
  num_discrete_actions: 4
  vaccine_budget_handling: "renorm"
  min_vaccine_amount: 0.0001
  entropy_coef_discrete: 0.01
  entropy_coef_continuous: 0.001
  masking_enabled: true

# ── Phase 4: Delayed Observation / Belief State ───────────────────────────────
lag:
  steps: 1              # reporting lag in env steps (0 = no lag)
  history_len: 4        # number of past observations in belief state
  mode: "concat"        # "concat" | "mean"
  pad_with_zeros: true

# ── Phase 5: System Identification ────────────────────────────────────────────
system_id:
  enabled: true
  window_size: 8         # rolling window for beta/gamma estimation
  beta_prior: 0.3
  gamma_prior: 0.1
  inject_features: true  # concatenate sysid features to policy input

# ── Phase 6: Multi-objective RL ───────────────────────────────────────────────
morl:
  weights:
    health: 0.5
    economy: 0.3
    control: 0.1
    penalty: 0.1
  dual_value_heads: false
  entropy_coef_discrete: 0.01
  entropy_coef_continuous: 0.001

# ── Logging & Checkpointing ────────────────────────────────────────────────────
logging:
  log_interval: 10
  checkpoint_dir: "checkpoints/full_pipeline"
  checkpoint_interval: 50
  tensorboard_enabled: true
  tensorboard_dir: "runs/full_pipeline"

# ── Evaluation (Phase 7 harness) ──────────────────────────────────────────────
eval:
  n_episodes: 5
  deterministic: true
  checkpoint_path: null
  tasks:
    - "easy_localized_outbreak"
    - "medium_multi_center_spread"
    - "hard_asymptomatic_high_density"
  seeds: [42, 43, 44]
