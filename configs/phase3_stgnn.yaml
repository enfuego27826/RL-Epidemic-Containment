# Phase 3 — Spatiotemporal GNN Encoder configuration
# Enables the STActorCritic with GNN + GRU temporal encoding.
# Used by: python scripts/train.py --config configs/phase3_stgnn.yaml

# ── Environment ────────────────────────────────────────────────────────────────
env:
  task_name: "easy_localized_outbreak"
  seed: 42
  max_nodes: 20

# ── PPO Hyperparameters ────────────────────────────────────────────────────────
ppo:
  total_timesteps: 200000
  n_envs: 1
  n_steps: 64
  batch_size: 256
  n_epochs: 4
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_loss_coef: 0.5
  max_grad_norm: 0.5

# ── Network Architecture ───────────────────────────────────────────────────────
model:
  policy_type: "st"                  # baseline | hybrid | st
  hidden_dims: [128, 128]
  gcn_hidden_dim: 32                 # GCN layer output dimension
  gru_hidden_dim: 32                 # GRU hidden state dimension
  global_context_dim: 32             # Global readout embedding dimension
  actor_hidden_dim: 64               # Actor/critic MLP head dimension

# ── Phase 2: Hybrid Action ────────────────────────────────────────────────────
hybrid:
  enabled: true
  num_discrete_actions: 4
  vaccine_budget_handling: "renorm"
  min_vaccine_amount: 0.0001
  entropy_coef_discrete: 0.01
  entropy_coef_continuous: 0.001
  masking_enabled: true

# ── Logging & Checkpointing ────────────────────────────────────────────────────
logging:
  log_interval: 10
  checkpoint_dir: "checkpoints/phase3"
  checkpoint_interval: 50

# ── Evaluation ────────────────────────────────────────────────────────────────
eval:
  n_episodes: 10
  deterministic: true
  checkpoint_path: null
  tasks: ["easy_localized_outbreak", "medium_multi_center_spread"]
  seeds: [42, 43, 44]
